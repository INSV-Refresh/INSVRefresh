<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="variaveis.css">
</head>

<body>
    <div class="header">
        <h1 class="glowPulse">
            <a href="/options.html" target="_blank">
                INSV REFRESH
            </a>
        </h1>
        <small>
            <span>
                <a href="https://github.com/insivam" target="_blank">Vitor Rodrigues</a>
            </span>&<span>
                <a href="https://github.com/Douglas-Rochaa" target="_blank">Douglas Rocha</a>
            </span>
        </small>
    </div>
    <hr>

    <div id="normal-mode">
        <div id="global-paused-banner" class="global-paused-banner" style="display: none;">
            <span data-i18n="paused_banner">⏸️ Atualização pausada</span>
            <button type="button" id="resume-all-btn" data-i18n="resume">Retomar</button>
        </div>
        <div id="queue-list"></div>
        <button id="add-queue-btn" class="add-queue-btn has-tooltip has-tooltip-add-queue-btn"
            data-tooltip="Adicionar fila" data-i18n-tooltip="tt_add_queue">
            <img class src="./assets/icons/add.png" alt="Icone de adicionar">
        </button>
    </div>

    <div id="legacy-mode">
        <div class="legacy-mode-containers">
            <div class="container-1">
                <div class="input-wrapper">
                    <input type="number" id="legacyInterval" class="queue-interval" min="5" max="900" value="10">
                    <span class="seconds">s</span>
                </div>
            </div>
            <div class="container-2">
                <button id="legacyToggle" class="queue-inactive" data-i18n="inactive">Inativo</button>
            </div>
        </div>
    </div>

    <hr>

    <div class="sound-and-range">
        <a href="/options.html" target="_blank" class="has-tooltip has-tooltip-settings"
            data-tooltip="Conheça mais sobre a extensão" data-i18n-tooltip="tt_settings">
            <img src="/assets/icons/settings.svg" alt="Configurações">
        </a>

        <div class="volume-control" id="volume-control">
            <span class="volume-icon" title="Volume da notificação" data-i18n-title="volume_title">🔊</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="50" />
        </div>
        <span id="status"></span>
        <a href="https://forms.gle/kCXquvvB3s2fHDTx7" target="_blank" class="feedback-link" data-i18n="feedback">Enviar feedback</a>
        <a href="/options.html#modo-legacy" target="_blank" id="legacy-text" class="has-tooltip has-tooltip-legacy-text"
            data-tooltip="Desative o modo legacy para mais funcionalidades!" data-i18n-tooltip="tt_legacy" data-i18n="legacy_mode">Modo Legacy</a>
    </div>

    <a href="https://chromewebstore.google.com/detail/grid-refresher/ohghgkmopfddmojeljidffidohcfpead/reviews?utm_source=item-share-cb"
        target="_blank" class="glowPulse review">✨</a>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
</body>

</html>
